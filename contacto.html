<main>
    <h2 id="main-title">Envíenos su consulta</h2>
    <body>
        <form action="https://formspree.io/f/mgeqvwgo" method="post">
            
            <label>Nombre</label>
            <input type="text" name="nombre" placeholder= "  Escriba su nombre"> 

            <label>Apellido</label>
            <input type="text" name="apellido" placeholder= "  Escriba su apellido"> 

            <label>Correo electrónico</label>
            <input type="email" name="email" placeholder= "  Escriba su Correo electrónico"> 

            <label>Contraseña</label>
            <input type="password" name="password" placeholder= "  Escriba su contraseña"> 

            <!-- <label>Fecha de nacimiento</label> 
            <input type="date" name="fecha" placeholder= "  Escriba su fecha de nacimiento">  -->

            <label>Tu consulta</label>
            <textarea name="consulta" id="" cols="30" rows="5" required></textarea>

            <label>Nacionalidad</label>
                <select>
                    <option value="ar">Argentina</option>
                    <option value="pe">Perú</option>
                    <option value="py">Paraguay</option>
                    <option value="ch">Chile</option>
                    <option value="uy">Uruguay</option>
                    <option value="bv">Bolivia</option>
                </select>

                <label>
                    <input type="checkbox" name="terminos"> Acepto términos y condiciones
                </label>
                <div class="botones">
                    <button type="submit">Enviar</button>
                    <button type="reset" class="limpiar">Limpiar</button>
        </form>
    </body>
